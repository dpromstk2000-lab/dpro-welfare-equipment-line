<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#145d66">
  <meta name="description" content="DPRO 福祉用具レンタル・販売 LINE スタッフログイン">
  <title>スタッフログイン｜DPRO 福祉用具レンタル・販売 LINE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">
      <span class="brand-mark">DPRO</span>
      <span><span data-office-name>DPRO 福祉用具センター</span><small>福祉用具レンタル・販売 LINE</small></span>
    </a>
    <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-label="メニューを開く">メニュー</button>
    <nav class="main-nav" data-main-nav>
      <a href="index.html">LINE利用者</a>
      <a href="member.html">会員画面</a>
      <a href="inquiry.html">相談受付</a>
      <a href="owner.html">オーナーPC</a>
      <a href="owner-ipad.html">相談員iPad</a>
      <a href="planning.html">アセスメント・計画</a>
      <a href="contract.html">契約・納品</a>
      <a href="aftercare.html">モニタリング・保守</a>
      <a href="billing.html">請求・入金</a>
      <a href="staff.html" aria-current="page">配送スタッフ</a>
      <a href="operations.html">運用設定</a>
      <a href="system-check.html">system-check</a>
    </nav>
  </div>
</header>
<main class="page narrow-page">
  <section class="hero">
    <p class="eyebrow">STAFF ACCESS</p>
    <h1>スタッフコード・PINでログイン</h1>
    <p>ロールに許可された画面と操作だけを利用できます。</p>
  </section>

  <section class="section grid grid--2 staff-login-grid">
    <article class="card">
      <p class="eyebrow">LOGIN</p>
      <h2>スタッフログイン</h2>
      <form id="staff-login-form" class="form-grid">
        <div class="field field--full"><label>スタッフコード</label><input name="staff_code" autocomplete="username" required placeholder="ST001"></div>
        <div class="field field--full"><label>PIN</label><input name="pin" type="password" inputmode="numeric" autocomplete="current-password" pattern="[0-9]{4,8}" required placeholder="4～8桁"></div>
        <div class="field field--full"><label>ログイン後の画面</label><select name="destination"><option value="staff.html">配送・設置スタッフ</option><option value="aftercare.html">モニタリング・保守</option><option value="planning.html">アセスメント・計画</option><option value="billing.html">請求・入金</option><option value="owner-ipad.html">相談員iPad</option></select></div>
        <div class="field field--full"><button class="button button--primary" type="submit">ログイン</button></div>
      </form>
      <p class="error-text" id="staff-login-error"></p>
    </article>

    <article class="card">
      <p class="eyebrow">DEMO ACCOUNTS</p>
      <h2>デモスタッフ</h2>
      <div class="demo-login-list">
        <button type="button" data-demo-staff="ST001" data-demo-pin="1111"><strong>ST001 福田 管理者</strong><span>PIN 1111｜owner</span></button>
        <button type="button" data-demo-staff="ST002" data-demo-pin="2222"><strong>ST002 佐藤 美咲</strong><span>PIN 2222｜specialist</span></button>
        <button type="button" data-demo-staff="ST003" data-demo-pin="3333"><strong>ST003 高橋 健太</strong><span>PIN 3333｜delivery</span></button>
      </div>
      <div class="notice notice--warning section">本番導入時はデモPINを使用せず、スタッフごとに4～8桁のPINを再設定します。</div>
      <a class="button button--outline" href="owner.html">管理コードで開く</a>
    </article>
  </section>
</main>
<footer class="footer">
  <div><strong data-office-name>DPRO 福祉用具センター</strong></div>
  <div>Version: <span data-system-version></span></div>
</footer>
<script src="config.js"></script>
<script src="api.js"></script>
<script src="shared.js"></script>
<script src="staff-login.js"></script>
</body>
</html>
